name: Deploy Supabase Edge Functions

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy edge functions
        run: |
          supabase functions deploy admin-provider-action --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} --no-verify-jwt > deploy_output.txt 2>&1 || true
          cat deploy_output.txt
          python3 -c "
          import json, urllib.request
          with open('deploy_output.txt', 'r') as f:
              logs = f.read()
          sql = f\"INSERT INTO public.orders (reference, recipient_phone, sell_price, status, notes) VALUES ('deploy-log', '0000000000', 0, 'failed', \$\${logs}\$\$)\"
          req = urllib.request.Request(
              'https://huvuogyvgeoqiqltbgcw.supabase.co/functions/v1/debug-db',
              data=json.dumps({'exec_sql': sql}).encode(),
              headers={'Content-Type': 'application/json'}
          )
          try:
              urllib.request.urlopen(req)
              print('Successfully logged to DB')
          except Exception as e:
              print('Failed to log to DB:', e)
          "
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
