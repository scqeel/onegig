name: Deploy Supabase Edge Functions

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy edge functions
        run: |
          supabase functions deploy admin-provider-action --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} --no-verify-jwt > deploy_output.txt 2>&1 || true
          node -e "console.log('::error::LOGS: ' + require('fs').readFileSync('deploy_output.txt').toString('base64'))"
          exit 1
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
