name: Deploy Supabase Edge Functions

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy edge functions
        run: |
          supabase functions deploy admin-provider-action --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Set provider secrets
        run: |
          supabase secrets set \
            DEVELOPER_API_KEY=${{ secrets.DEVELOPER_API_KEY }} \
            DEVELOPER_API_BASE_URL=https://lsocdjpflecduumopijn.supabase.co/functions/v1/developer-api \
            --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} || echo "Failed to set secrets"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
